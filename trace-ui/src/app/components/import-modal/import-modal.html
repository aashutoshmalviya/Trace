<div class="modal-overlay">
  <div class="modal-content">

    <div class="modal-header">
      <h2>Import Project</h2>
      <button class="icon-btn close-btn" (click)="resetAndClose()">×</button>
    </div>

    <div class="modal-tabs">
      <button [class.active]="importType() === 'local'" (click)="setImportType('local')">
        📁 Local Path
      </button>
      <button [class.active]="importType() === 'git'" (click)="setImportType('git')">
        🐙 Git Repo
      </button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label>Project Name</label>
        <input type="text" placeholder="e.g. Trace" [ngModel]="newProjectName()"
          (ngModelChange)="newProjectName.set($event)" [disabled]="isImporting()">
      </div>

      <div class="form-group">
        <label *ngIf="importType() === 'local'">Absolute Directory Path</label>
        <label *ngIf="importType() === 'git'">Git Repository URL</label>

        <input type="text"
          [placeholder]="importType() === 'local' ? '/Users/Code/Project' : 'https://github.com/user/repo.git'"
          [ngModel]="newProjectSource()" (ngModelChange)="newProjectSource.set($event)" [disabled]="isImporting()">
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn secondary" (click)="resetAndClose()" [disabled]="isImporting()">Cancel</button>
      <button class="btn primary" (click)="submitImport()"
        [disabled]="!newProjectName() || !newProjectSource() || isImporting()">
        {{ isImporting() ? 'Importing...' : 'Import Project' }}
      </button>
    </div>

  </div>
</div>
